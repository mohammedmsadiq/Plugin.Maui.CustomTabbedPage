name: Build Sample App for CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-sample-ci:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Install MAUI Android workload
        run: dotnet workload install maui-android
      - name: Build Sample
        run: dotnet build samples\Plugin.Maui.CustomTabbedPage.Sample\Plugin.Maui.CustomTabbedPage.Sample.csproj -c Release -f net9.0-android -p:TargetFramework=net9.0-android -p:TargetFrameworks=net9.0-android
