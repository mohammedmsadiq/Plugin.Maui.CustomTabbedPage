name: Release

# Release workflow: triggered when a semver tag (e.g. v1.2.3) is pushed.
# Steps:
#   1. Run unit tests (gate — release is aborted if tests fail).
#   2. Validate that the pushed tag version matches the version in Directory.Build.props.
#   3. Build and pack the NuGet package.
#   4. Create a GitHub Release and attach the .nupkg and .snupkg files.
#   5. Publish to NuGet.org if the NUGET_API_KEY secret is configured.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ── Unit tests (gate) ─────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-test-${{ runner.os }}-${{ hashFiles('tests/**/*.csproj') }}
          restore-keys: |
            nuget-test-${{ runner.os }}-

      - name: Restore test project
        run: dotnet restore tests/Plugin.Maui.CustomTabbedPage.Tests

      - name: Run unit tests
        run: >
          dotnet test tests/Plugin.Maui.CustomTabbedPage.Tests
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results
          path: tests/Plugin.Maui.CustomTabbedPage.Tests/TestResults/

  # ── Version validation ────────────────────────────────────────────────────
  # Ensures the pushed tag (e.g. v1.2.3) matches <PluginVersion> in
  # Directory.Build.props (e.g. 1.2.3) so accidental mismatches are caught
  # before a package is published.
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check tag matches Directory.Build.props version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROPS_VERSION=$(grep -oP '(?<=<PluginVersion>)[^<]+' Directory.Build.props)
          echo "Tag version:   $TAG"
          echo "Props version: $PROPS_VERSION"
          if [ "$TAG" != "$PROPS_VERSION" ]; then
            echo "::error::Tag version '$TAG' does not match PluginVersion '$PROPS_VERSION' in Directory.Build.props."
            exit 1
          fi

  # ── Build, pack & release ─────────────────────────────────────────────────
  release:
    name: Build, Pack & Release
    runs-on: macos-latest
    needs: validate-version
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-build-${{ runner.os }}-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            nuget-build-${{ runner.os }}-

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Restore packages
        run: dotnet restore src/Plugin.Maui.CustomTabbedPage

      - name: Build
        run: dotnet build src/Plugin.Maui.CustomTabbedPage --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/Plugin.Maui.CustomTabbedPage
          --configuration Release
          --no-build
          --output ./artifacts

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*.nupkg,artifacts/*.snupkg"
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          bodyFile: CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NuGet.org
        if: env.NUGET_API_KEY != ''
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ secrets.NUGET_API_KEY }}
          --skip-duplicate
