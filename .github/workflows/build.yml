name: Build

# CI workflow: runs on every push and pull request targeting main or develop.
# Builds the plugin library for all supported platforms and produces a NuGet
# package artifact for verification.

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ── Library build & pack ──────────────────────────────────────────────────
  # Builds the multi-targeted MAUI library (net8.0-ios + net8.0-android) and
  # produces a NuGet package. Runs on macOS so iOS and Android SDK tooling is
  # available via the MAUI workload.
  build:
    name: Build & Pack
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-build-${{ runner.os }}-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            nuget-build-${{ runner.os }}-

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Restore packages
        run: dotnet restore src/Plugin.Maui.CustomTabbedPage

      - name: Build
        run: dotnet build src/Plugin.Maui.CustomTabbedPage --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/Plugin.Maui.CustomTabbedPage
          --configuration Release
          --no-build
          --output ./artifacts

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: artifacts/*.nupkg

      - name: Upload symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-symbols
          path: artifacts/*.snupkg
