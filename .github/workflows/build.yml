name: Build

# CI workflow: runs on every push and pull request targeting main or develop.
# It builds the plugin library, runs unit tests, and produces a NuGet package
# artifact for verification.

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ── Unit tests ────────────────────────────────────────────────────────────
  # Tests target plain net8.0 so they run on ubuntu without MAUI workloads.
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-test-${{ runner.os }}-${{ hashFiles('tests/**/*.csproj') }}
          restore-keys: |
            nuget-test-${{ runner.os }}-

      - name: Restore test project
        run: dotnet restore tests/Plugin.Maui.CustomTabbedPage.Tests

      - name: Run unit tests
        run: >
          dotnet test tests/Plugin.Maui.CustomTabbedPage.Tests
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/Plugin.Maui.CustomTabbedPage.Tests/TestResults/

  # ── Library build & pack ──────────────────────────────────────────────────
  # Builds the multi-targeted MAUI library and produces a NuGet package.
  # Runs on macOS so that iOS and Android SDK tooling is available.
  build:
    name: Build & Pack
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-build-${{ runner.os }}-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            nuget-build-${{ runner.os }}-

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Restore packages
        run: dotnet restore src/Plugin.Maui.CustomTabbedPage

      - name: Build
        run: dotnet build src/Plugin.Maui.CustomTabbedPage --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/Plugin.Maui.CustomTabbedPage
          --configuration Release
          --no-build
          --output ./artifacts

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: artifacts/*.nupkg

      - name: Upload symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-symbols
          path: artifacts/*.snupkg
